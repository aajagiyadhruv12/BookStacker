services:
  - type: web
    name: BookStacker-Backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FLASK_ENV
        value: production
      - key: DEBUG
        value: "False"
      # Note: You must still add SECRET_KEY and FIREBASE_SERVICE_ACCOUNT_JSON manually in the Render Dashboard
