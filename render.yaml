services:
  - type: web
    name: bookstacker-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FLASK_ENV
        value: production
      - key: DEBUG
        value: "False"
      - key: FIREBASE_STORAGE_BUCKET
        value: "bookstacker0.firebasestorage.app"
